<div
  class="ht-panel"
  [class.maximized]="isMaximized"
  cdkDrag
  [cdkDragDisabled]="isMaximized"
  [cdkDragBoundary]="boundaryRef"
>
  <div class="ht-header" cdkDragHandle>
    <span class="title">Home Theater</span>

    <div class="ht-controls">
      <button class="ctrl-btn" (click)="minimize()">🗕</button>
      <button class="ctrl-btn" (click)="toggleMaximize()">🗖</button>
      <button class="ctrl-btn close" (click)="close()">✕</button>
    </div>
  </div>

  <div class="ht-body">
    <app-home-theater-builder></app-home-theater-builder>
  </div>
</div>
