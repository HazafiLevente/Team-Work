<app-context-menu-base [x]="x" [y]="y" (close)="close.emit()">

  <div class="menu-section">

    <button class="menu-item" (click)="$event.stopPropagation(); emitAndClose(openItem)">
      📂 Megnyitás
    </button>

    <button class="menu-item" (click)="$event.stopPropagation(); emitAndClose(rename)">
      ✏️ Átnevezés
    </button>

    <button class="menu-item" (click)="$event.stopPropagation(); emitAndClose(modify)">
      🛠 Módosítás
    </button>

  </div>

  <div class="menu-separator"></div>

  <div class="menu-section">

    <button class="menu-item danger" (click)="$event.stopPropagation(); emitAndClose(deleteItem)">
      🗑 Törlés
    </button>

  </div>

</app-context-menu-base>
