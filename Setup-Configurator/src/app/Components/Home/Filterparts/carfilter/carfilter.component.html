<div class="carfilter" *ngIf="form" [formGroup]="form">

  <div class="carfilter-header">
    <span class="tag">🚗 Autók</span>
    <span class="muted">Csak autó táblákra szűr</span>
  </div>

  <div class="muted" *ngIf="loading">Betöltés…</div>
  <div class="muted" *ngIf="error">{{ error }}</div>

  <div class="filter-grid" *ngIf="!loading">

    <!-- TÁBLA (bodyType helyett ez a tuti) -->
    <select class="search-input" formControlName="tableName" title="Autó tábla">
      <option value="">Autó típus (összes)</option>
      <option *ngFor="let t of meta?.table_names" [value]="t">{{ t }}</option>
    </select>

    <!-- MANUFACTURER -->
    <select class="search-input" formControlName="manufacturer" title="Gyártó">
      <option value="">Gyártó (összes)</option>
      <option *ngFor="let m of meta?.manufacturers" [value]="m">{{ m }}</option>
    </select>

    <input class="search-input" placeholder="Modell (pl. 320d)" formControlName="model"/>

    <input class="search-input" type="number" min="0" placeholder="Ár min (Ft)" formControlName="priceMin"/>
    <input class="search-input" type="number" min="0" placeholder="Ár max (Ft)" formControlName="priceMax"/>

    <!-- BODY TYPE (valós DB értékek!) -->
    <select class="search-input" formControlName="bodyType" title="Kivitel">
      <option value="">Kivitel (összes)</option>
      <option *ngFor="let x of meta?.body_types" [value]="x">{{ x }}</option>
    </select>

    <input class="search-input" type="number" min="0" placeholder="Lóerő min" formControlName="hpMin"/>
    <input class="search-input" type="number" min="0" placeholder="Lóerő max" formControlName="hpMax"/>

    <input class="search-input" type="number" min="0" step="0.1" placeholder="0–100 min (s)" formControlName="accelMin"/>
    <input class="search-input" type="number" min="0" step="0.1" placeholder="0–100 max (s)" formControlName="accelMax"/>

    <input class="search-input" type="number" min="1" placeholder="Ülések min" formControlName="seatsMin"/>
    <input class="search-input" type="number" min="1" placeholder="Ülések max" formControlName="seatsMax"/>

    <!-- FUEL (valós DB értékek!) -->

    <select class="search-input" formControlName="fuel" title="Üzemanyag">
      <option value="">Üzemanyag (összes)</option>
      <option *ngFor="let x of meta?.fuel_types" [value]="x">{{ x }}</option>
    </select>

    <input class="search-input" type="number" min="1950" placeholder="Évjárat min" formControlName="yearMin"/>
    <input class="search-input" type="number" min="1950" placeholder="Évjárat max" formControlName="yearMax"/>

    <!-- TRANSMISSION (valós DB értékek!) -->
    <select class="search-input" formControlName="transmission" title="Váltó">
      <option value="">Váltó (összes)</option>
      <option *ngFor="let x of meta?.transmissions" [value]="x">{{ x }}</option>
    </select>

  </div>

  <div class="carfilter-footer">
    <button type="button" class="btn small" (click)="clear()">🧹 Autó szűrők törlése</button>
    <span class="muted">A 🔎 Keresés gomb ezeket is figyelembe veszi.</span>
  </div>

</div>
