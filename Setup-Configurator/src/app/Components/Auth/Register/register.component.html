<form (ngSubmit)="submit()" class="panel">
  <h2>Registration</h2>

  <input placeholder="Fullname" [(ngModel)]="fullname" name="fullname" required />
  <input placeholder="Username" [(ngModel)]="username" name="username" required />
  <input placeholder="Email" [(ngModel)]="email" name="email" required />
  <input type="password" placeholder="Password" [(ngModel)]="password" name="password" required />

  <button class="btn">Connect</button>

  <p>
    Van már fiókod?
    <a routerLink="/auth/login">Bejelentkezés</a>
  </p>

</form>
