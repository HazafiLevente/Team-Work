<div class="overlay" (click)="close()"></div>

<div class="panel">
  <div class="panel-header">
    <div class="title">
      <div class="model">{{ product?.model }}</div>
      <div class="sub">{{ product?.manufacturer }}</div>
    </div>

    <button class="close-btn" (click)="close()">✕</button>
  </div>

  <div class="panel-body">
    <div style="color: lime; font-weight: 800; margin-bottom: 12px;">
      DETAILS DEBUG: {{ details | json }}
    </div>

    <div *ngIf="loading">Betöltés...</div>

    <div *ngIf="!loading && error" class="error">
      {{ error }}
    </div>

    <ng-container *ngIf="!loading && details">
      <div class="price">
        Ár: <strong>{{ displayPrice(details) }}</strong>
      </div>

      <div class="kv">
        <div class="row" *ngFor="let k of keysOf(details)">
          <ng-container *ngIf="!isHiddenKey(k)">
            <div class="k">{{ k }}</div>
            <div class="v">{{ details[k] }}</div>
          </ng-container>
        </div>
      </div>

      <div class="panel-footer">
        <button class="btn secondary" (click)="onMore()">Több</button>
        <button class="btn primary icon" (click)="onPlus()">+</button>
      </div>
    </ng-container>
  </div>
</div>
