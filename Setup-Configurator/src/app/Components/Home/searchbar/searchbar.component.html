<div class="searchbar-row" role="search">

  <!-- Gyártó -->
  <select [(ngModel)]="manufacturer"
          class="ctrl w-manufacturer"
          title="Gyártó szűrő">
    <option value="">Összes gyártó</option>
    <option *ngFor="let m of manufacturers" [value]="m">{{ m }}</option>
  </select>

  <!-- Modell keresés -->
  <input type="text"
         class="ctrl w-term"
         title="Keresés modell névre"
         placeholder="Keresés: model..."
         [(ngModel)]="term"
         (keydown.enter)="searchButton()" />

  <!-- Min ár (desktop only mobilon elrejtjük CSS-sel) -->
  <input type="number"
         class="ctrl w-price min-price"
         title="Minimum ár (Ft)"
         [ngModel]="priceMin"
         (ngModelChange)="priceMin = $event"
         placeholder="Min ár (Ft)"
         min="0"
         step="1"
         (input)="sanitizePrice('min')" />

  <!-- Max ár (desktop only mobilon elrejtjük CSS-sel) -->
  <input type="number"
         class="ctrl w-price max-price"
         title="Maximum ár (Ft)"
         [ngModel]="priceMax"
         (ngModelChange)="priceMax = $event"
         placeholder="Max ár (Ft)"
         min="0"
         step="1"
         (input)="sanitizePrice('max')" />

  <!-- Rendezés (desktop only mobilon elrejtjük CSS-sel) -->
  <select [(ngModel)]="sort"
          class="ctrl w-sort sort-select"
          title="Rendezés">
    <option value="">Alap (nincs rendezés)</option>
    <option value="price_asc">Ár ↑ növekvő</option>
    <option value="price_desc">Ár ↓ csökkenő</option>
    <option value="name_asc">Név A→Z</option>
    <option value="name_desc">Név Z→A</option>
  </select>

  <!-- Keresés gomb -->
  <button type="button"
          class="btn small w-btn"
          title="Keresés indítása"
          (click)="searchButton()">
    🔎 Keresés
  </button>

</div>
