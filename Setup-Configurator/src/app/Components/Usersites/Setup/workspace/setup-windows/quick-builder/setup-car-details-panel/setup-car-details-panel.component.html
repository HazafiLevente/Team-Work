<div
  #panelEl
  class="panel"
  [style.left.px]="panelX"
  [style.top.px]="panelY"
  (click)="stop($event)"
  (mousemove)="onDrag($event)"
  (mouseup)="stopDrag()"
  (mouseleave)="stopDrag()"
>
  <div class="titlebar" (mousedown)="startDrag($event)">
    <div class="caption">
      <div class="big">{{ title() }}</div>
      <div class="small">Autó adatok</div>
    </div>
    <button class="x" type="button" (click)="onClose()">×</button>
  </div>

  <div class="content">
    @if (loading) {
      <div class="hint">Betöltés...</div>
    } @else {
      @if (errorMsg) {
        <div class="error">{{ errorMsg }}</div>
      } @else {
        <div class="rows">
          @for (r of rows; track r.key) {
            <div class="row">
              <div class="k">{{ r.label }}</div>
              <div class="v">{{ r.value }}</div>
            </div>
          }
        </div>
        <div class="foot">Húzható a fejlécnél fogva.</div>
      }
    }
  </div>
</div>
