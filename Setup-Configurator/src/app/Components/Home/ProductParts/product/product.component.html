<div class="product-card" (click)="open()">
  <img [src]="imageUrl" alt="product image" class="product-img" />

  <h3>{{ product.model }}</h3>
  <p>{{ product.manufacturer }}</p>

  <p>
    <strong>
      {{ displayPrice !== null ? (displayPrice | number:'1.0-0') + ' Ft' : 'N/A' }}
    </strong>
  </p>
</div>
