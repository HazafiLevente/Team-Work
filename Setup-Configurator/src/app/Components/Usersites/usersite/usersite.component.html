<div class="usersite-layout">

  <aside class="usersite-sidebar">

    <button routerLink="profile" routerLinkActive="active" class="nav-btn">
      <span class="nav-icon">👤</span>
      <span class="nav-label">Profile</span>
    </button>

    <button routerLink="messages" routerLinkActive="active" class="nav-btn">
      <span class="nav-icon">💬</span>
      <span class="nav-label">Messages</span>
    </button>

    <button routerLink="plan" routerLinkActive="active" class="nav-btn">
      <span class="nav-icon">⭐</span>
      <span class="nav-label">Plan</span>
    </button>

    <button routerLink="setup" routerLinkActive="active" class="nav-btn">
      <span class="nav-icon">🧰</span>
      <span class="nav-label">Setups</span>
    </button>

    <button routerLink="/settings" routerLinkActive="active" class="nav-btn">
      <span class="nav-icon">⚙️</span>
      <span class="nav-label">Settings</span>
    </button>

    <button
      *ngIf="(user$ | async)?.role && ['admin','admin+','owner'].includes((user$ | async)!.role)"
      routerLink="admin"
      routerLinkActive="active"
      class="nav-btn admin-btn">

      <span class="nav-icon">🛡</span>
      <span class="nav-label">Admin</span>
    </button>

  </aside>

  <main class="usersite-content">
    <router-outlet></router-outlet>
  </main>

</div>
