<div class="drag-element" [class.circle]="isNetwork()" cdkDrag [attr.data-id]="dataId" [cdkDragBoundary]="boundaryRef"
  (cdkDragStarted)="onDragStarted()" (cdkDragEnded)="onDragEnded()" (cdkDragMoved)="onDragMoved()" (click)="onClick()"
  (contextmenu)="onRightClick($event)">

  <span class="setup-name">
    {{ setup?.display_name || setup?.setup_name || setup?.name || 'Névtelen setup' }}
  </span>
</div>
