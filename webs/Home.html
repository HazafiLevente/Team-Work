<!doctype html>
<html lang="hu">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Setup Configurator</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
<header class="top-menu">
    <div class="brand">
        <div class="logo">SC</div>
        <div>
            <h1>Setup Configurator</h1>
            <div class="muted" style="font-size:12px;margin-top:2px">Test Version</div>
        </div>
    </div>

    <nav class="nav" aria-label="Főmenü">
        <a href="/home">Home</a>
        <a href="/setup">My Setup</a>
        <a href="/profile">Profile</a>
        <a href="/favorite">Favorite</a>

        <!-- 🔒 ADMIN – alapból rejtve -->
        <a href="/admin" id="admin-link" class="admin-link hidden">Admin</a>

        <a class="cta" id="auth-btn" href="/regist">Connect</a>
    </nav>

</header>

<main class="content">


    <!-- 🔍 SEARCH + FILTER BAR -->
    <div style="margin-bottom: 20px; grid-column: 1 / -1; display:flex; gap:12px;">
        <input
                id="search-input"
                type="text"
                placeholder="Keresés: manufacturer, model, kategória..."
                style="
            flex:1;
            padding:14px;
            border-radius:10px;
            background:rgba(255,255,255,0.05);
            border:1px solid rgba(255,255,255,0.12);
            color:white;
            font-size:16px;
        ">

        <button id="filter-toggle-btn" class="btn">
            🧰 Szűrő
        </button>
    </div>

    <!-- 🧰 FILTER PANEL (alapból rejtve) -->
    <div id="filter-panel" class="hidden" style="
    grid-column:1 / -1;
    background:rgba(255,255,255,0.04);
    border:1px solid rgba(255,255,255,0.1);
    border-radius:12px;
    padding:16px;
    margin-bottom:20px;
">
        <strong>Gyártók</strong>
        <div id="brand-filters" style="
        margin-top:10px;
        display:grid;
        grid-template-columns:repeat(auto-fill,minmax(180px,1fr));
        gap:8px;
    "></div>
    </div>

    <!-- 🟣 PRODUCT GRID -->
    <div id="product-grid" style="grid-column: 1 / -1;"></div>



</main>




<script src="script.js"></script>
</body>
</html>
