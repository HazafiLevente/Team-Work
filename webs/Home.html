<!doctype html>
<html lang="hu">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Setup Configurator</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
<header class="top-menu">
    <div class="brand">
        <div class="logo">SC</div>
        <div>
            <h1>Setup Configurator</h1>
            <div class="muted" style="font-size:12px;margin-top:2px">Test Version</div>
        </div>
    </div>

    <nav class="nav" aria-label="Főmenü">
        <a href="/home">Home</a>
        <a href="/">Projects</a>
        <a href="/profile">Profile</a>
        <a class="cta" id="auth-btn" href="/regist">Connect</a>
    </nav>
</header>

<main class="content">

    <!-- 🔍 GLOBAL SEARCH BAR -->
    <div style="margin-bottom: 20px; grid-column: 1 / -1;">
        <input
                id="search-input"
                type="text"
                placeholder="Keresés: manufacturer, model, kategória..."
                style="
                width:100%;
                padding:14px;
                border-radius:10px;
                background:rgba(255,255,255,0.05);
                border:1px solid rgba(255,255,255,0.12);
                color:white;
                font-size:16px;
            ">
    </div>

    <!-- 🟣 GLOBAL PRODUCT GRID -->
    <div id="product-grid" style="grid-column: 1 / -1;"></div>

</main>




<script src="script.js"></script>
</body>
</html>
