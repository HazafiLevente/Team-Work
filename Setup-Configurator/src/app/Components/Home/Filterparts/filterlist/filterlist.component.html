<details class="advanced">
  <summary title="Részletes keresési panelek megnyitása / bezárása">
    Több:
    <span class="muted">(részletes keresés)</span>
  </summary>

  <div class="category-row">
    <button
      type="button"
      class="tag"
      title="Autók részletes szűrő panel"
      [class.active]="active.car"
      (click)="toggle('car'); $event.stopPropagation()"
    >
      🚗 Autók
    </button>

    <button
      type="button"
      class="tag"
      title="PC / Informatika részletes szűrő panel"
      [class.active]="active.computer"
      (click)="toggle('computer'); $event.stopPropagation()"
    >
      🖥 Computer
    </button>

    <button
      type="button"
      class="tag"
      title="Home Theatre részletes szűrő panel"
      [class.active]="active.ht"
      (click)="toggle('ht'); $event.stopPropagation()"
    >
      🎬 HT
    </button>

    <button
      type="button"
      class="tag"
      title="Hangszerek részletes szűrő panel"
      [class.active]="active.instrument"
      (click)="toggle('instrument'); $event.stopPropagation()"
    >
      🎸 Instr
    </button>
  </div>

  <app-carfilter
    *ngIf="active.car"
    (filtersChange)="onCarChange($event)">
  </app-carfilter>

  <app-computerfilter
    *ngIf="active.computer"
    (filtersChange)="onComputerChange($event)">
  </app-computerfilter>

  <app-hometheaterfilter
    *ngIf="active.ht"
    (filtersChange)="onHtChange($event)">
  </app-hometheaterfilter>

  <app-instrumentfilter
    *ngIf="active.instrument"
    (filtersChange)="onInstrumentChange($event)">
  </app-instrumentfilter>
</details>
