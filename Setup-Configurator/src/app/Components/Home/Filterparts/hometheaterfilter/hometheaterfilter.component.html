<div class="carfilter" [formGroup]="form">

  <div class="carfilter-header">
    <span class="tag">🎬 HT</span>
    <span class="muted">Csak HomeTheatre táblákra szűr</span>
  </div>

  <div class="filter-grid">

    <select class="search-input" formControlName="type">
      <option value="">Típus (összes)</option>
      <option value="speaker">Hangfalak (összes)</option>
      <option value="sub">Sub / Bass</option>
      <option value="processor">AV proci / erősítő</option>
      <option value="portable">Hordozható hangszóró</option>
      <option value="set">Home Theatre szett</option>
    </select>

    <input
      class="search-input"
      placeholder="Gyártó (pl. Sony, Samsung)"
      formControlName="manufacturer"
    />

    <input
      class="search-input"
      placeholder="Modell"
      formControlName="model"
    />

    <input
      class="search-input"
      placeholder="Min csatorna (pl 2.1)"
      formControlName="minChannels"
    />

    <input
      class="search-input"
      placeholder="Max csatorna (pl 7.1.2)"
      formControlName="maxChannels"
    />

    <input
      class="search-input"
      type="number"
      min="0"
      placeholder="Min teljesítmény (W)"
      formControlName="minPower"
    />

    <input
      class="search-input"
      type="number"
      min="0"
      placeholder="Max teljesítmény (W)"
      formControlName="maxPower"
    />

    <!-- ✅ nicer toggles -->
    <div class="toggle-row">
      <label class="toggle">
        <input type="checkbox" formControlName="bluetooth" />
        <span class="pill">Bluetooth</span>
      </label>

      <label class="toggle">
        <input type="checkbox" formControlName="wifi" />
        <span class="pill">Wi-Fi</span>
      </label>

      <label class="toggle">
        <input type="checkbox" formControlName="earc" />
        <span class="pill">HDMI eARC</span>
      </label>
    </div>

  </div>

  <div class="carfilter-footer">
    <button type="button" class="btn small" (click)="clear()">
      🧹 HT szűrők törlése
    </button>

    <span class="muted">
      A 🔎 Keresés gomb ezeket is figyelembe veszi.
    </span>
  </div>

</div>
