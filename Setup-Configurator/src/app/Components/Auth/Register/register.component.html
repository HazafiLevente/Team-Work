<form *ngIf="step === 'form'" (ngSubmit)="submit()">

  <h2 class="title">Regisztráció</h2>

  <input
    [(ngModel)]="fullname"
    name="fullname"
    placeholder="Teljes név"
    required
  />

  <input
    [(ngModel)]="username"
    name="username"
    placeholder="Felhasználónév"
    required
  />

  <input
    [(ngModel)]="email"
    name="email"
    type="email"
    placeholder="Email cím"
    required
  />

  <input
    type="password"
    [(ngModel)]="password"
    name="password"
    placeholder="Jelszó (legalább 6 karakter)"
    required
  />

  <p class="switch-auth">
    Van már fiókom?
    <a routerLink="/login">Bejelentkezés</a>
  </p>

  <button type="submit">Regisztráció</button>

</form>
