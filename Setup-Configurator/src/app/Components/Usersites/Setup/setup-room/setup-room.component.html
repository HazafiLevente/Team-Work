<div #root class="drag-element" [class.circle]="isNetwork()" cdkDrag [cdkDragDisabled]="dragDisabled"
  [cdkDragFreeDragPosition]="initialPosition" [attr.data-id]="dataId" [cdkDragBoundary]="boundaryRef"
  (cdkDragStarted)="onDragStarted()" (cdkDragEnded)="onDragEnded($event)" (cdkDragMoved)="onDragMoved()"
  (click)="onClick()" (contextmenu)="onRightClick($event)">

  <span class="setup-name" *ngIf="!editing">
    {{ setup?.display_name || setup?.setup_name || setup?.name || 'Névtelen setup' }}
  </span>

  <input *ngIf="editing" class="setup-edit-input" [(ngModel)]="editName" (keydown.enter)="confirmRename()"
    (keydown.escape)="cancelRename()" (blur)="confirmRename()" (mousedown)="$event.stopPropagation()"
    (click)="$event.stopPropagation()" />

</div>
