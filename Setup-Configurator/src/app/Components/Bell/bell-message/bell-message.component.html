<div class="chat-layout">

  <!-- BAL OLDAL -->
  <div class="chat-list">
    <div
      *ngFor="let c of conversations"
      class="chat-item"
      [class.active]="c.key === activeKey"
      (click)="openConversation(c.key)">
      <div class="title">{{ c.title }}</div>
      <div class="last">{{ c.lastMessage }}</div>
    </div>
  </div>

  <!-- JOBB OLDAL -->
  <div class="chat-window">
    <div *ngFor="let m of messages" class="chat-message">
      <div class="sender">👤 {{ m.sender_name }}</div>
      <div class="text">{{ m.message }}</div>
      <div class="time">{{ timeAgo(m.created_at) }}</div>
    </div>
  </div>

</div>
