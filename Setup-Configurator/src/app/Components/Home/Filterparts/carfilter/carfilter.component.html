<div class="carfilter" [formGroup]="form">

  <div class="carfilter-header">
    <span class="tag">🚗 Autók</span>
    <span class="muted">Csak autó táblákra szűr</span>
  </div>

  <div class="filter-grid">

    <input
      class="search-input"
      placeholder="Gyártó (pl. BMW)"
      formControlName="manufacturer"
    />

    <input
      class="search-input"
      placeholder="Modell (pl. 320d)"
      formControlName="model"
    />

    <input
      class="search-input"
      type="number"
      min="0"
      placeholder="Ár min (Ft)"
      formControlName="priceMin"
    />

    <input
      class="search-input"
      type="number"
      min="0"
      placeholder="Ár max (Ft)"
      formControlName="priceMax"
    />

    <select class="search-input" formControlName="bodyType">
      <option value="">Kivitel (összes)</option>
      <option value="hatchback">Hatchback</option>
      <option value="coupe">Coupé</option>
      <option value="cabrio">Cabrio</option>
      <option value="wagon">Kombi</option>
      <option value="mpv">Egyterű</option>
      <option value="sedan">Sedan</option>
      <option value="suv">SUV</option>
    </select>

    <input
      class="search-input"
      type="number"
      min="0"
      placeholder="Lóerő min"
      formControlName="hpMin"
    />

    <input
      class="search-input"
      type="number"
      min="0"
      placeholder="Lóerő max"
      formControlName="hpMax"
    />

    <input
      class="search-input"
      type="number"
      min="0"
      step="0.1"
      placeholder="0–100 min (s)"
      formControlName="accelMin"
    />

    <input
      class="search-input"
      type="number"
      min="0"
      step="0.1"
      placeholder="0–100 max (s)"
      formControlName="accelMax"
    />

    <input
      class="search-input"
      type="number"
      min="1"
      placeholder="Ülések min"
      formControlName="seatsMin"
    />

    <input
      class="search-input"
      type="number"
      min="1"
      placeholder="Ülések max"
      formControlName="seatsMax"
    />

    <select class="search-input" formControlName="fuel">
      <option value="">Üzemanyag (összes)</option>
      <option value="hybrid">Hibrid</option>
      <option value="petrol">Benzin</option>
      <option value="diesel">Dízel</option>
      <option value="electric">Elektromos</option>
    </select>

    <input
      class="search-input"
      type="number"
      min="1950"
      placeholder="Évjárat min"
      formControlName="yearMin"
    />

    <input
      class="search-input"
      type="number"
      min="1950"
      placeholder="Évjárat max"
      formControlName="yearMax"
    />

    <select class="search-input" formControlName="transmission">
      <option value="">Váltó (összes)</option>
      <option value="manual">Manuális</option>
      <option value="automatic">Automata</option>
    </select>

  </div>

  <div class="carfilter-footer">
    <button
      type="button"
      class="btn small"
      (click)="clear()"
    >
      🧹 Autó szűrők törlése
    </button>

    <span class="muted">
      A 🔎 Keresés gomb ezeket is figyelembe veszi.
    </span>
  </div>

</div>
