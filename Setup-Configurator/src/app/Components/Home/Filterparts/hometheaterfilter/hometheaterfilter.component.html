<div class="carfilter" *ngIf="form" [formGroup]="form">

  <div class="carfilter-header">
    <span class="tag" title="Home Theatre kategória szűrők">🎬 HT</span>
    <span class="muted2">Meta-alapú (dinamikus) HT szűrő</span>
  </div>

  <div class="muted" *ngIf="loading">Betöltés…</div>
  <div class="muted" *ngIf="error">{{ error }}</div>

  <div class="filter-grid" *ngIf="!loading">

    <!-- TÁBLA / TÍPUS -->
    <select class="search-input" title="HT tábla" formControlName="tableName">
      <option value="">HT típus (összes)</option>
      <option *ngFor="let t of meta?.table_names" [value]="t">{{ t }}</option>
    </select>

    <!-- MANUFACTURER -->
    <select class="search-input" title="Gyártó" formControlName="manufacturer">
      <option value="">Gyártó (összes)</option>
      <option *ngFor="let m of meta?.manufacturers" [value]="m">{{ m }}</option>
    </select>

    <!-- MODEL -->
    <input class="search-input"
           title="Modell részlet"
           placeholder="Modell (pl. Q990D)"
           formControlName="model" />

    <!-- PRICE -->
    <input class="search-input"
           type="number"
           min="0"
           title="Min ár"
           placeholder="Ár min"
           formControlName="priceMin" />

    <input class="search-input"
           type="number"
           min="0"
           title="Max ár"
           placeholder="Ár max"
           formControlName="priceMax" />

    <!-- DYNAMIC FIELDS -->
    <ng-container *ngFor="let f of meta?.dynamic">

      <!-- BOOLEAN -->
      <div class="toggle-row" *ngIf="f.kind === 'boolean'">
        <label class="toggle" [title]="f.key">
          <input type="checkbox" [formControlName]="f.key" />
          <span class="pill">{{ f.key }}</span>
        </label>
      </div>

      <!-- SELECT -->
      <select class="search-input"
              *ngIf="f.kind === 'select'"
              [title]="f.key"
              [formControlName]="f.key">
        <option value="">{{ f.key }} (összes)</option>
        <option *ngFor="let opt of f.options" [value]="opt">{{ opt }}</option>
      </select>

      <!-- RANGE -->
      <ng-container *ngIf="f.kind === 'range'">
        <!-- itt csinálhatod inputból is, de a meta->options listázás jól működik -->
        <select class="search-input"
                [title]="f.key + ' min'"
                [formControlName]="f.key + 'Min'">
          <option value="">{{ f.key }} min</option>
          <option *ngFor="let opt of f.options" [value]="opt">{{ opt }}</option>
        </select>

        <select class="search-input"
                [title]="f.key + ' max'"
                [formControlName]="f.key + 'Max'">
          <option value="">{{ f.key }} max</option>
          <option *ngFor="let opt of f.options" [value]="opt">{{ opt }}</option>
        </select>
      </ng-container>

    </ng-container>

  </div>

  <div class="carfilter-footer">
    <button type="button"
            class="btn small"
            title="Törli a HT szűrőket"
            (click)="clear()">
      🧹 HT szűrők törlése
    </button>

    <span class="muted">A 🔎 Keresés gomb ezeket is figyelembe veszi.</span>
  </div>

</div>
