<section class="section">

  <div class="section-header">
    <h3>Profil adatok</h3>
    <span>Felhasználónév, elérhetőség</span>
  </div>

  <div class="section-hr"></div>

  <div class="profile-display" [formGroup]="form">

    <!-- USERNAME -->
    <div class="profile-row">
      <label>Felhasználónév</label>

      <span
        *ngIf="editingField !== 'username'"
        (dblclick)="enableEdit('username')">
        {{ form.value.username || '-' }}
      </span>

      <input
        *ngIf="editingField === 'username'"
        formControlName="username"
        (blur)="saveField()"
        (keydown.enter)="saveField()"
      />
    </div>

    <!-- FULLNAME -->
    <div class="profile-row">
      <label>Teljes név</label>

      <span
        *ngIf="editingField !== 'fullname'"
        (dblclick)="enableEdit('fullname')">
        {{ form.value.fullname || '-' }}
      </span>

      <input
        *ngIf="editingField === 'fullname'"
        formControlName="fullname"
        (blur)="saveField()"
        (keydown.enter)="saveField()"
      />
    </div>

    <!-- PHONE -->
    <div class="profile-row">
      <label>Telefonszám</label>

      <span
        *ngIf="editingField !== 'phone'"
        (dblclick)="enableEdit('phone')">
        {{ form.value.phone || '-' }}
      </span>

      <input
        *ngIf="editingField === 'phone'"
        formControlName="phone"
        (blur)="saveField()"
        (keydown.enter)="saveField()"
      />
    </div>

    <!-- AGE -->
    <div class="profile-row">
      <label>Életkor</label>

      <span
        *ngIf="editingField !== 'age'"
        (dblclick)="enableEdit('age')">
        {{ form.value.age || '-' }}
      </span>

      <input
        *ngIf="editingField === 'age'"
        type="number"
        formControlName="age"
        (blur)="saveField()"
        (keydown.enter)="saveField()"
      />
    </div>

    <!-- CITY -->
    <div class="profile-row">
      <label>Város</label>

      <span
        *ngIf="editingField !== 'city'"
        (dblclick)="enableEdit('city')">
        {{ form.value.city || '-' }}
      </span>

      <input
        *ngIf="editingField === 'city'"
        formControlName="city"
        (blur)="saveField()"
        (keydown.enter)="saveField()"
      />
    </div>

  </div>

</section>
