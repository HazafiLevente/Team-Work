<form *ngIf="step === 'form'" (ngSubmit)="submit()">
  <input [(ngModel)]="fullname" name="fullname" required />
  <input [(ngModel)]="username" name="username" required />
  <input [(ngModel)]="email" name="email" required />
  <input type="password" [(ngModel)]="password" name="password" required />
  <button type="submit">Regisztráció</button>
</form>

<form *ngIf="step === 'code'" (ngSubmit)="verify()">
  <h3>Emailben kaptál egy kódot</h3>
  <input [(ngModel)]="code" name="code" required />
  <button type="submit">Megerősítés</button>
</form>
