<div class="overlay" (click)="close()"></div>

<div class="panel" (click)="$event.stopPropagation()">
  <!-- FIX X mindig látható -->
  <button class="x" type="button" (click)="close()" aria-label="Bezárás">✕</button>

  <div class="panel-header">
    <div class="title">
      <div class="model">{{ displayModel || 'N/A' }}</div>
      <div class="sub">{{ displayManufacturer || 'N/A' }}</div>
    </div>
  </div>

  <div class="panel-body">
    <div *ngIf="loading">Betöltés...</div>
    <div *ngIf="!loading && error" class="error">{{ error }}</div>

    <div *ngIf="!loading && details">
      <div class="price">
        Ár: <strong>{{ details.price ? (details.price | number:'1.0-0') + ' Ft' : 'N/A' }}</strong>
      </div>

      <div class="kv">
        <div class="row" *ngFor="let k of detailsKeys; trackBy: trackKey">
          <ng-container *ngIf="!isHiddenKey(k)">
            <div class="k">{{ k }}</div>
            <div class="v">{{ details[k] }}</div>
          </ng-container>
        </div>
      </div>
    </div>
  </div>

  <div class="panel-footer" *ngIf="!loading && details">
    <button type="button" class="btn secondary" (click)="onMore()">Több</button>
    <button type="button" class="btn primary icon" (click)="onPlus()">+</button>
  </div>
</div>
