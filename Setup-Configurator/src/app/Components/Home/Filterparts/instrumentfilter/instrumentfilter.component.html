<div class="carfilter" [formGroup]="form">

  <div class="carfilter-header">
    <span class="tag" title="Instrument kategória szűrők">🎸 Instr</span>
    <span class="muted">Egyszerű szűrő (meta: gyártók + táblák)</span>
  </div>

  <div *ngIf="loadingMeta" class="muted" style="padding: 10px;">
    Meta betöltése...
  </div>

  <div class="filter-grid" *ngIf="!loadingMeta">


    <select class="search-input" formControlName="itemType" title="Típus">
      <option value="all">Minden</option>
      <option value="instrument">Instrument</option>
      <option value="accessory">Accessory</option>
    </select>


    <select class="search-input" formControlName="tableName" title="Tábla">
      <option value="">Tábla (összes)</option>
      <option *ngFor="let t of (meta?.table_names || [])" [value]="t">{{ t }}</option>
    </select>


    <select class="search-input" formControlName="manufacturer" title="Gyártó">
      <option value="">Gyártó (összes)</option>
      <option *ngFor="let m of (meta?.manufacturers || [])" [value]="m">{{ m }}</option>
    </select>


    <input class="search-input"
           placeholder="Modell"
           title="Modell"
           formControlName="model" />

  </div>

  <div class="carfilter-footer">
    <button type="button"
            class="btn small"
            title="Törli az Instr szűrőket"
            (click)="clear()">
      🧹 Instr szűrők törlése
    </button>

    <span class="muted">A 🔎 Keresés gomb ezeket is figyelembe veszi.</span>
  </div>

</div>
