<div class="device-row">

  <span class="device-type">
    {{ getDeviceType().toUpperCase() }}
  </span>

  <span class="device-name">
    {{ device?.display_name || device?.name }}
  </span>

  <button
    type="button"
    class="device-delete"
    [disabled]="deleting"
    (click)="onDelete($event)">
    {{ deleting ? '...' : 'X' }}
  </button>

</div>
