<div #overlay class="ps-overlay" (click)="onOverlayClick()"></div>


<div
  #overlay
  class="ps-overlay"
  (click)="onOverlayClick()"
  aria-hidden="true"
></div>


<aside #panel class="ps-panel" [attr.data-pos]="position">
  <div class="ps-head">
    <div class="ps-title">Termék</div>
    <button class="ps-close" type="button" (click)="requestClose()">×</button>
  </div>

  <div #content class="ps-content">
    <ng-container *ngIf="product; else empty">
      <div class="ps-manu">{{ product?.manufacturer || '—' }}</div>
      <div class="ps-model">{{ product?.model || '—' }}</div>
      <div class="ps-price">{{ formatPrice(product?.price) }}</div>

      <div class="ps-chips">
        <span class="chip">table: {{ tableName }}</span>
        <span class="chip">id: {{ product?.id }}</span>
      </div>


      <div class="ps-specs" *ngIf="product?.data">
        <div class="row" *ngFor="let kv of (product?.data | keyvalue) | slice:0:10">
          <div class="k">{{ kv.key }}</div>
          <div class="v">{{ kv.value }}</div>
        </div>
      </div>
    </ng-container>

    <ng-template #empty>
      <div class="ps-empty">Nincs kiválasztott termék.</div>
    </ng-template>
  </div>
</aside>
