<main class="content">


  <!-- 🔍 SEARCH BAR + BRAND SELECT -->
  <div style="margin-bottom: 20px; grid-column: 1 / -1; display:flex; gap:12px; flex-wrap:wrap;">

    <select id="manufacturer-select" style="
        min-width:240px;
        padding:14px;
        border-radius:10px;
        background:rgba(255,255,255,0.05);
        border:1px solid rgba(255,255,255,0.12);
        color:white;
        font-size:16px;
    ">
      <option value="">⏳ Gyártók betöltése...</option>
    </select>

    <input
      id="search-input"
      type="text"
      placeholder="Keresés: model, kategória..."
      style="
            flex:1;
            min-width:220px;
            padding:14px;
            border-radius:10px;
            background:rgba(255,255,255,0.05);
            border:1px solid rgba(255,255,255,0.12);
            color:white;
            font-size:16px;
        ">

    <input
      id="min-price"
      type="number"
      inputmode="numeric"
      placeholder="Min ár (Ft)"
      style="
    width:160px;
    padding:14px;
    border-radius:10px;
    background:rgba(255,255,255,0.05);
    border:1px solid rgba(255,255,255,0.12);
    color:white;
    font-size:16px;
  "
    >

    <input
      id="max-price"
      type="number"
      inputmode="numeric"
      placeholder="Max ár (Ft)"
      style="
    width:160px;
    padding:14px;
    border-radius:10px;
    background:rgba(255,255,255,0.05);
    border:1px solid rgba(255,255,255,0.12);
    color:white;
    font-size:16px;
  "
    >

    <select id="sort-select" style="
  width:220px;
  padding:14px;
  border-radius:10px;
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.12);
  color:white;
  font-size:16px;
">
      <option value="relevance">Alap (nincs rendezés)</option>
      <option value="price_asc">Ár ↑ növekvő</option>
      <option value="price_desc">Ár ↓ csökkenő</option>
      <option value="name_asc">Név A→Z</option>
      <option value="name_desc">Név Z→A</option>
    </select>




    <button id="brand-search-btn" class="btn" (click)="searchButton()">
      🔎 Keresés
    </button>

  </div>


</main>
