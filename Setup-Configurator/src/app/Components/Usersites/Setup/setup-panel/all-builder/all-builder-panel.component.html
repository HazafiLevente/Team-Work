<div class="all-builder-shell">
  <div class="all-builder-body">
    @if (loading) {
      <div class="state">Termékek betöltése...</div>
    } @else {
      @if (error) {
        <div class="state error">{{ error }}</div>
      }

      @if (success) {
        <div class="state success">{{ success }}</div>
      }

      <div class="grid">
        <div class="field-card full">
          <label class="field-label">Termék kiválasztása</label>
          <select
            class="select"
            [(ngModel)]="selectedProductKey"
          >
            <option value="">-- válassz terméket --</option>

            @for (prod of products; track trackProduct($index, prod)) {
              <option [value]="prod.__prodKey">
                {{ getProductLabel(prod) }}
              </option>
            }
          </select>
        </div>

      </div>

      <div class="actions">
        <button
          type="button"
          class="save-btn"
          (click)="saveProduct()"
          [disabled]="saving || loading"
        >
          @if (saving) {
            Mentés...
          } @else {
            {{ editChildSetupId ? 'Módosítás mentése' : 'Termék hozzáadása' }}
          }
        </button>
      </div>
    }
  </div>
</div>
