<div
  #root
  class="drag-element item-element"
  cdkDrag
  [cdkDragDisabled]="dragDisabled || isRenaming"
  [cdkDragFreeDragPosition]="dragPosition"
  [cdkDragBoundary]="boundaryRef"
  [attr.data-id]="dataId"
  (cdkDragMoved)="onDragMoved()"
  (cdkDragEnded)="onDragEnded($event)"
  (click)="onClick()"
  (dblclick)="onDblClick()"
  (contextmenu)="onRightClick($event)"
>
  <ng-container *ngIf="!isRenaming; else renameTpl">
    <span class="setup-name">
      {{ displayName }}
    </span>
  </ng-container>

  <ng-template #renameTpl>
    <input
      #renameInput
      type="text"
      [value]="renameValue"
      (input)="onRenameInput($event)"
      (keydown.enter)="confirmRename()"
      (keydown.escape)="cancelRename()"
      (blur)="confirmRename()"
      (click)="$event.stopPropagation()"
      (dblclick)="$event.stopPropagation()"
      style="
        width: 88%;
        max-width: 88%;
        border: 1px solid #94a3b8;
        outline: none;
        background: #ffffff;
        color: #111827;
        caret-color: #111827;
        border-radius: 10px;
        padding: 8px 10px;
        text-align: center;
        font-size: 14px;
        font-weight: 600;
        box-sizing: border-box;
      "
    />
  </ng-template>
</div>
