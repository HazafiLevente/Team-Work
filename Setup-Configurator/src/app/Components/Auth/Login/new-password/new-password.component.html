<form (ngSubmit)="resetPassword()" class="auth-form">
  <h2 class="title">Új jelszó beállítása</h2>
  <p class="subtitle">
    A kód erre ment: <span class="email">{{ email }}</span>
  </p>

  <div *ngIf="error" class="error-box">{{ error }}</div>
  <div *ngIf="message" class="success-box">{{ message }}</div>

  <input
    [(ngModel)]="code"
    name="code"
    inputmode="numeric"
    placeholder="6 jegyű kód"
    required
  />

  <div class="password-wrap">
    <input
      [type]="showPassword ? 'text' : 'password'"
      [(ngModel)]="newPassword"
      name="newPassword"
      placeholder="Új jelszó"
      required
    />
    <button type="button" class="eye-btn" (click)="togglePassword()">
      {{ showPassword ? '🙈' : '👁️' }}
    </button>
  </div>

  <button class="btn" type="submit" [disabled]="loading">
    {{ loading ? 'Mentés...' : 'Jelszó módosítása' }}
  </button>

  <button class="link-btn" type="button" (click)="back.emit()">
    ← Vissza a bejelentkezéshez
  </button>
</form>
