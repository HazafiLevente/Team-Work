<form (ngSubmit)="submit.emit()" class="auth-form">
  <h2 class="title">Regisztráció</h2>

  <div *ngIf="errorMessage" class="error-box">{{ errorMessage }}</div>
  <div *ngIf="successMessage" class="success-box">{{ successMessage }}</div>

  <input
    [ngModel]="fullname"
    (ngModelChange)="fullnameChange.emit($event)"
    name="fullname"
    placeholder="Teljes név"
    required
  />

  <input
    [ngModel]="username"
    (ngModelChange)="usernameChange.emit($event)"
    name="username"
    placeholder="Felhasználónév"
    required
  />

  <input
    [ngModel]="email"
    (ngModelChange)="emailChange.emit($event)"
    name="email"
    type="email"
    placeholder="Email cím"
    required
  />

  <div class="password-wrap">
    <input
      [type]="showPassword ? 'text' : 'password'"
      [ngModel]="password"
      (ngModelChange)="passwordChange.emit($event)"
      name="password"
      placeholder="Jelszó (min. 6 karakter)"
      required
    />
    <button type="button" class="eye-btn" (click)="togglePassword()">
      {{ showPassword ? '🙈' : '👁️' }}
    </button>
  </div>

  <button class="btn" type="submit" [disabled]="loading">
    {{ loading ? 'Küldés...' : 'Regisztráció' }}
  </button>

  <p class="switch-auth">
    Van már fiókom!
    <a routerLink="/login">Bejelentkezek</a>
  </p>
</form>
