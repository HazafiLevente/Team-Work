<div class="setup-workspace">
  <div class="boundary-area" #boundary>
    @if (!loading) {
      <div class="drag-element" cdkDrag [cdkDragBoundary]="boundary">
        <div class="drag-content">
          <span>Új Setup Tervezése</span>
          <small>(Összesen: {{ setupCount }} mentett)</small>
        </div>
      </div>
    } @else {
      <div class="loader">Betöltés...</div>
    }
  </div>
</div>
