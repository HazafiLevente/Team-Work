<app-context-menu-base [x]="x" [y]="y" (close)="close.emit()">

  <div class="menu-section">

    @if (isInsideSetup) {
      <div class="menu-label">Új eszköz hozzáadása</div>
      <button class="menu-item" (click)="$event.stopPropagation(); selectCategory('PC')">
        💻 Számítógép
      </button>
      <button class="menu-item" (click)="$event.stopPropagation(); selectCategory('AUTO')">
        🚗 Autó
      </button>
      <button class="menu-item" (click)="$event.stopPropagation(); selectCategory('HT')">
        🏠 Házimozi
      </button>
      <button class="menu-item" (click)="$event.stopPropagation(); selectCategory('INST')">
        🎸 Hangszerek
      </button>
      <button class="menu-item" (click)="$event.stopPropagation(); selectCategory('OTHER')">
        📦 Egyéb
      </button>
    } @else {
      <button class="menu-item create" (click)="$event.stopPropagation(); emitAndClose()">
        ➕ Új Setup létrehozása
      </button>
    }

  </div>

</app-context-menu-base>
