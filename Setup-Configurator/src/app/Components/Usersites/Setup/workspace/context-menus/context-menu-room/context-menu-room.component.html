<app-context-menu-base
  [x]="x"
  [y]="y"
  (close)="close.emit()"
>

  <div class="menu-section">

    <button class="menu-item" (click)="emitAndClose(openSetup)">
      📂 Megnyitás
    </button>

    <button class="menu-item" (click)="emitAndClose(openTools)">
      🧰 Eszközök
    </button>

    <button class="menu-item" (click)="emitAndClose(rename)">
      ✏️ Átnevezés
    </button>

  </div>

  <div class="menu-separator"></div>

  <div class="menu-section">

    <button
      class="menu-item"
      (click)="connect.emit(); close.emit()"
    >
      Összekötés
    </button>

    <button class="menu-item" (click)="emitAndClose(connections)">
      📡 Kapcsolatok
    </button>

  </div>

  <div class="menu-separator"></div>

  <div class="menu-section">

    <div class="menu-item danger" (click)="emitAndClose(deleteSetup)">
      🗑 Törlés
    </div>

  </div>

</app-context-menu-base>
