<div class="gallery-card">
  <ng-container *ngIf="hasImages; else noImages">

    <div class="swap-wrap">
      <app-card-swap
        [images]="images"
        [height]="'100%'"
        [width]="'100%'"
        [activeIndex]="active"
        [cardDistance]="55"
        [verticalDistance]="18"
        [delay]="4500"
        [pauseOnHover]="true"
        [skewAmount]="0"
        easing="elastic"
        (cardClick)="openViewer($event)">
      </app-card-swap>
    </div>

    <div class="thumbs" *ngIf="images.length > 1">
      <button
        class="thumb"
        *ngFor="let img of images; let i = index"
        [class.active]="i === active"
        (click)="setActive(i)"
        title="Kép váltás">
        <img [src]="img" alt="" />
      </button>
    </div>

  </ng-container>

  <ng-template #noImages>
    <div class="noimg">
      <div class="noimg-box">Nincs kép</div>
      <div class="noimg-hint">Később ide jönnek a termék képei.</div>
    </div>
  </ng-template>
</div>

<!-- Fullscreen viewer -->
<div class="viewer" *ngIf="viewerOpen">
  <div class="viewer-overlay" (click)="closeViewer()"></div>

  <div class="viewer-inner">
    <button class="nav left" (click)="prev()" aria-label="Előző">‹</button>

    <div class="viewer-frame" [attr.data-dir]="direction">
      <img [src]="currentSrc" [alt]="title" class="viewer-img" />
    </div>

    <button class="nav right" (click)="next()" aria-label="Következő">›</button>

    <button class="close" (click)="closeViewer()" aria-label="Bezárás">✕</button>

    <div class="counter" *ngIf="hasImages">
      {{ active + 1 }} / {{ images.length }}
    </div>
  </div>
</div>
