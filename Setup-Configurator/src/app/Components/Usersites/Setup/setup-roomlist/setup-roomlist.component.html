<!-- setup-roomlist.component.html -->
<div class="setup-shell">

  <!-- BAL OLDAL: ez lesz a DRAG BOUNDARY -->
  <div class="setup-workspace" #boundary>

    <app-dot-grid
      class="dot-bg"
      [dotSize]="5"
      [gap]="15"
      baseColor="#271E37"
      activeColor="#5227FF"
      [proximity]="100"
      [shockRadius]="250"
      [shockStrength]="5"
      [resistance]="750"
      [returnDuration]="1.5">
    </app-dot-grid>

    <!-- csak layout tartó -->
    <div class="boundary-area">

      @if (!loading) {
        @for (setup of userSetups; track $index) {
          <app-setup-room
            [setup]="setup"
            [boundaryRef]="boundary"
            (setupRightClick)="openContextMenu($event)">
          </app-setup-room>
        }
        @empty {
          <div class="no-data">Nincs setup.</div>
        }
      } @else {
        <div class="no-data">Betöltés...</div>
      }

    </div>

    <!-- ✅ Jobb klikk menü -->
    @if (ctxOpen) {
      <div class="ctx-backdrop" (mousedown)="closeContextMenu()">
        <div
          class="ctx-menu"
          [style.left.px]="ctxX"
          [style.top.px]="ctxY"
          (mousedown)="$event.stopPropagation()">

          <button class="ctx-item" type="button">Megnyitás</button>

          <!-- ✅ CSAK EZ MŰKÖDJÖN MOST -->
          <button class="ctx-item" type="button" (click)="openToolsFromMenu()">Eszközök</button>

          <button class="ctx-item" type="button">Módosítás</button>
          <button class="ctx-item" type="button">Kapcsolatok</button>

          <div class="ctx-sep"></div>

          <button class="ctx-item" type="button">Favorite</button>
          <button class="ctx-item" type="button">Tulajdonságok</button>

        </div>
      </div>
    }

  </div>
</div>

<!-- ✅ Eszközök modal -->
@if (toolsOpen && toolsSetup) {
  <app-setup-tools-modal
    [setup]="toolsSetup"
    (close)="closeTools()">
  </app-setup-tools-modal>
}
