<div class="products-left">
  <div class="search-wrap">
    <input
      class="search"
      [ngModel]="search"
      (ngModelChange)="searchChange.emit($event)"
      placeholder="Keresés..."
    />
  </div>

  <div class="list">
    <button
      type="button"
      *ngFor="let p of products"
      class="product-card"
      [class.active]="selected?.id === p.id && selected?.table_name === p.table_name"
      (click)="productSelect.emit(p)"
    >
      <div class="brand">{{ p.manufacturer }}</div>
      <div class="model">{{ p.model }}</div>
    </button>
  </div>
</div>
