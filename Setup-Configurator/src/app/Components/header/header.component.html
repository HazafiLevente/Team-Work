<header class="top-menu">

  <div class="brand" routerLink="/home">
    <div class="logo">SC</div>
    <div>
      <h1>Setup Configurator</h1>
      <div class="muted" style="font-size:12px;margin-top:2px">#1.0 Version</div>
    </div>
  </div>

  <nav class="nav">

    <!-- 🔐 GUEST -->
    <button
      *ngIf="!(user$ | async)"
      class="btn ghost"
      routerLink="/auth/login">
      Connect
    </button>

    <!-- 👤 LOGGED IN USER -->
    <div
      *ngIf="user$ | async as user"
      class="user-wrap"
      (click)="toggleMenu()">

      <span class="username">
        {{ user.username }}
      </span>

      <div class="user-avatar">
        <span class="avatar-placeholder"></span>
      </div>

      <!-- 🔽 DROPDOWN -->
      <div *ngIf="dropdownOpen" class="user-menu neon">
        <div class="menu-title">{{ user.username }}</div>
        <div class="muted">{{ user.email }}</div>

        <hr>

        <div class="menu-item" routerLink="/usersite/profile">👤 Profile</div>
        <div class="menu-item" routerLink="/favorite">⭐ Favorite</div>
        <div class="menu-item" routerLink="/setup">🧰 My Setup</div>

        <div
          *ngIf="['admin','admin+','owner'].includes(user.role)"
          class="menu-item"
          routerLink="/admin">
          🛡 Admin
        </div>

        <hr>

        <div class="menu-item danger" (click)="logout()">
          🚪 Logout
        </div>
      </div>

    </div>
  </nav>
</header>
