<div class="chat-layout">

  <!-- SIDEBAR -->
  <div class="chat-sidebar" [class.hidden-mobile]="isMobile && mobileView !== 'list'">

    <div class="sidebar-header">
      <span>Beszélgetések</span>
    </div>

    <div
      *ngFor="let c of conversations"
      class="chat-item"
      [class.active]="c.key === activeKey"
      (click)="goToConversation(c.key)"
      (contextmenu)="onRightClickConversation($event, c)">

      <div class="avatar">
        {{ (c.title || '?').charAt(0) }}
      </div>

      <div class="chat-info">
        <div class="chat-title">{{ c.title }}</div>
        <div class="chat-preview">{{ c.lastText || '—' }}</div>
      </div>
    </div>

    <button class="new-chat-btn" type="button" (click)="toggleNewChat()">
      + Új beszélgetés
    </button>

    <div *ngIf="showNewChat" class="user-list">
      <div
        *ngFor="let u of users"
        class="user-row"
        (click)="startConversation(u)">
        {{ u.username }}
      </div>
    </div>

  </div>

  <!-- CHAT AREA -->
  <div class="chat-content" [class.hidden-mobile]="isMobile && mobileView !== 'chat'">

    <!-- ✅ MOBILE TOPBAR -->
    <div class="chat-topbar" *ngIf="isMobile">
      <button class="back-btn" type="button" (click)="goBackToList()">←</button>
      <div class="chat-top-title">{{ getActiveTitle() }}</div>
    </div>

    <div class="messages-container">

      <div
        *ngFor="let m of messages"
        class="message"
        [class.mine]="m.user_id === authUserId"
        (contextmenu)="onRightClickMessage($event, m)">

        <!-- EDIT MODE -->
        <ng-container *ngIf="editingMessageId === m.id; else normalMessage">

          <div class="edit-box">
            <input
              [(ngModel)]="editText"
              (keyup.enter)="saveEdit()"
            />
            <div class="edit-actions">
              <button type="button" (click)="saveEdit()">✔</button>
              <button type="button" (click)="cancelEdit()">✖</button>
            </div>
          </div>

        </ng-container>

        <!-- NORMAL MODE -->
        <ng-template #normalMessage>

          <div class="bubble-wrapper">

            <div class="bubble">
              {{ m.context }}
            </div>

            <!-- 3 DOT MENU -->
            <div
              *ngIf="m.user_id === authUserId"
              class="menu-wrapper">

              <button
                type="button"
                class="dots-btn"
                (click)="toggleMenu(m.id, $event)">
                ⋮
              </button>

              <div
                *ngIf="openMenuId === m.id"
                class="dropdown-menu"
                (click)="$event.stopPropagation()">

                <div class="dropdown-item" (click)="startEdit(m)">
                  ✏ Szerkesztés
                </div>

                <div class="dropdown-item danger" (click)="deleteMessage(m.id)">
                  🗑 Törlés
                </div>

              </div>

            </div>

          </div>

          <div class="time">
            {{ timeAgo(m.created_at) }}
          </div>

        </ng-template>

      </div>

      <div *ngIf="messages.length === 0" class="empty">
        Nincs üzenet
      </div>

      <div #bottom></div>

    </div>

    <!-- INPUT -->
    <div *ngIf="activeKey" class="chat-input">
      <input
        [(ngModel)]="newMessage"
        placeholder="Írj üzenetet..."
        (keyup.enter)="sendMessage()"
      />
      <button type="button" (click)="sendMessage()">Küldés</button>
    </div>

  </div>

  <!-- ✅ Right-click context menu -->
  <div
    *ngIf="contextMenuOpen"
    class="ctx-backdrop"
    (click)="closeContextMenu()">
  </div>

  <div
    *ngIf="contextMenuOpen"
    class="ctx-menu"
    [style.left.px]="contextMenuX"
    [style.top.px]="contextMenuY"
    (click)="$event.stopPropagation()">

    <div class="ctx-item" (click)="ctxDetails()">Részletek</div>
    <div class="ctx-sep"></div>

    <div class="ctx-item" (click)="ctxMute()">Lenémítás</div>
    <div class="ctx-item" (click)="ctxDisable()">Tiltás</div>
    <div class="ctx-item" (click)="ctxBlock()">Blokkolás</div>

    <div class="ctx-sep"></div>
    <div class="ctx-item danger" (click)="ctxDelete()">Törlés</div>
  </div>

</div>
