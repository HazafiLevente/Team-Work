<app-click-spark
  *ngIf="!setupMode"
  [sparkColor]="'#fff'"
  [sparkSize]="8"
  [sparkRadius]="15"
  [sparkCount]="8"
  [duration]="400">

  <!-- TOP: search + mobile filter button -->
  <div class="home-top">

    <!-- Searchbar wrapper (hogy a mobil sticky CSS biztosan eltalálja) -->
    <div class="searchbar">
      <app-searchbar></app-searchbar>
    </div>

    <!-- Mobile: “Több” gomb (bottom sheet) -->
    <button
      type="button"
      class="more-btn mobile-only"
      (click)="mobileFiltersOpen = true">
      Több: <span class="muted">(részletes keresés)</span>
    </button>

    <!-- Desktop: filterlist kint marad -->
    <div class="desktop-only">
      <app-filterlist></app-filterlist>
    </div>

  </div>

  <!-- MAIN: products + right side -->
  <div class="home-row">
    <div class="left">
      <app-productlist
        (openProduct)="onOpenProduct($event)"
        (productsChanged)="onProductsChanged($event)"
        (statsChanged)="onStatsChanged($event)">
      </app-productlist>
    </div>

    <!-- Right side: desktop only -->
    <div class="right desktop-only">
      <app-quick-stats
        [total]="totalAll"
        [pool]="featuredPool.length"
        [chips]="allCategories">
      </app-quick-stats>

      <app-featured-spotlight
        [products]="featuredPool"
        (openProduct)="onOpenProduct($event)">
      </app-featured-spotlight>
    </div>
  </div>

  <!-- Product details panel -->

  <app-product-details-panel
    *ngIf="selectedProduct"
    [product]="selectedProduct"
    (closed)="onClosePanel()">
  </app-product-details-panel>


  <!-- MOBILE FILTER SHEET -->
  <div
    class="mobile-overlay"
    *ngIf="mobileFiltersOpen"
    (click)="closeMobileFilters()">
  </div>

  <div class="mobile-sheet" [class.open]="mobileFiltersOpen">
    <div class="sheet-header">
      <div class="title">Részletes szűrők</div>
      <button type="button" class="x" (click)="closeMobileFilters()">✕</button>
    </div>

    <app-filterlist></app-filterlist>
  </div>

</app-click-spark>
