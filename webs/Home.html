<!doctype html>
<html lang="hu">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Setup Configurator</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
<header class="top-menu">
    <div class="brand">
        <div class="logo">SC</div>
        <div>
            <h1>Setup Configurator</h1>
            <div class="muted" style="font-size:12px;margin-top:2px">Test Version</div>
        </div>
    </div>

    <nav class="nav" aria-label="Főmenü">
        <a href="/home">Home</a>
        <a href="/setup">My Setup</a>
        <a href="/profile">Profile</a>
        <a href="/favorite">Favorite</a>

        <!-- 🔒 ADMIN – alapból rejtve -->
        <a href="/admin" id="admin-link" class="admin-link hidden">Admin</a>

        <a class="cta" id="auth-btn" href="/regist">Connect</a>
    </nav>

</header>

<main class="content">


    <!-- 🔍 SEARCH BAR + BRAND SELECT -->
    <div style="margin-bottom: 20px; grid-column: 1 / -1; display:flex; gap:12px; flex-wrap:wrap;">

        <select id="manufacturer-select" style="
        min-width:240px;
        padding:14px;
        border-radius:10px;
        background:rgba(255,255,255,0.05);
        border:1px solid rgba(255,255,255,0.12);
        color:white;
        font-size:16px;
    ">
            <option value="">⏳ Gyártók betöltése...</option>
        </select>

        <input
                id="search-input"
                type="text"
                placeholder="Keresés: model, kategória..."
                style="
            flex:1;
            min-width:220px;
            padding:14px;
            border-radius:10px;
            background:rgba(255,255,255,0.05);
            border:1px solid rgba(255,255,255,0.12);
            color:white;
            font-size:16px;
        ">

        <input
                id="min-price"
                type="number"
                inputmode="numeric"
                placeholder="Min ár (Ft)"
                style="
    width:160px;
    padding:14px;
    border-radius:10px;
    background:rgba(255,255,255,0.05);
    border:1px solid rgba(255,255,255,0.12);
    color:white;
    font-size:16px;
  "
        >

        <input
                id="max-price"
                type="number"
                inputmode="numeric"
                placeholder="Max ár (Ft)"
                style="
    width:160px;
    padding:14px;
    border-radius:10px;
    background:rgba(255,255,255,0.05);
    border:1px solid rgba(255,255,255,0.12);
    color:white;
    font-size:16px;
  "
        >

        <select id="sort-select" style="
  width:220px;
  padding:14px;
  border-radius:10px;
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.12);
  color:white;
  font-size:16px;
">
            <option value="relevance">Alap (nincs rendezés)</option>
            <option value="price_asc">Ár ↑ növekvő</option>
            <option value="price_desc">Ár ↓ csökkenő</option>
            <option value="name_asc">Név A→Z</option>
            <option value="name_desc">Név Z→A</option>
        </select>




        <button id="brand-search-btn" class="btn">
            🔎 Keresés
        </button>

    </div>

    <!-- 🟣 PRODUCT GRID -->
    <div id="product-grid" style="grid-column: 1 / -1;"></div>



</main>




<script src="script.js"></script>
</body>
</html>
