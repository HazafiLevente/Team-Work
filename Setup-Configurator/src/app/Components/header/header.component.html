<header class="top-menu">

  <div class="brand" routerLink="/home">
    <div class="logo">SC</div>
    <div>
      <h1>Setup Configurator</h1>
      <div class="muted" style="font-size:12px;margin-top:2px">#1.0 Version</div>
    </div>
  </div>

  <nav class="nav">
    <div class="header-right">

    </div>
    <button
      *ngIf="!(user$ | async)"
      class="btn ghost"
      routerLink="/login">
      Connect
    </button>

    <div
      *ngIf="user$ | async"
      class="bell-wrap"
      (click)="toggleBell($event)">

      <i class="fas fa-bell"></i>

      <div
        *ngIf="bellOpen$ | async"
        class="bell-dropdown"
        (click)="$event.stopPropagation()">

        <div *ngIf="(bellItems$ | async)?.length === 0" class="bell-item muted">
          {{ text.headerComponentZeroNotification }}
        </div>

        <div
          *ngFor="let n of (bellItems$ | async)"
          class="bell-item"
          [class.unread]="!n.read"
          (click)="openMessage(n, $event)">

          <div class="bell-title">
            {{ bellTypeLabel(n) }}
          </div>

          <div class="bell-message">
            {{ n.title }}
          </div>

          <div class="bell-date">
            {{ n.created_at | date:'HH:mm' }}
          </div>
        </div>

      </div>
    </div>

    <div
      *ngIf="user$ | async as user"
      class="user-wrap"
      (click)="toggleMenu(); $event.stopPropagation()">

      <span class="username">{{ user.username }}</span>

      <div class="user-avatar">
        <span class="avatar-placeholder"></span>
      </div>

      <!-- ✅ dropdown always in DOM -->
      <div #userMenu class="user-menu neon" [attr.aria-hidden]="!dropdownOpen">

        <div class="menu-title">{{ user.username }}</div>
        <div class="muted">{{ user.email }}</div>

        <hr>

        <div class="menu-item" routerLink="/user/profile">👤 Profile</div>
        <div class="menu-item" routerLink="/user/favorite">⭐ Favorite</div>
        <div class="menu-item" routerLink="/user/setup">🧰 My Setup</div>

        <!-- ✅ Rangok -->
        <div id="rank">
          <app-rank-panel [embedded]="true"></app-rank-panel>
        </div>



        <div
          *ngIf="['admin','admin+','owner'].includes(user.role)"
          class="menu-item"
          routerLink="/user/admin">
          🛡 Admin
        </div>

        <hr>

        <div class="menu-item danger" (click)="logout()">
          🚪 Logout
        </div>

      </div>
    </div>

  </nav>
</header>

<!-- ✅ ezt teheted ide is -->
<app-rank-panel *ngIf="ranksOpen" (close)="closeRanks()"></app-rank-panel>
