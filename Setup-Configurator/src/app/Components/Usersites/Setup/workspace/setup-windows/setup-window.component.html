<div
  class="window"
  [class.maximized]="maximized"
  [style.z-index]="zIndex"
  cdkDrag
  [cdkDragBoundary]="boundaryRef"
  [cdkDragDisabled]="maximized"
  [cdkDragFreeDragPosition]="dragPosition"
  (mousedown)="onFocus()"
>

  <div class="window-header" cdkDragHandle>
    <span class="window-title">{{ titleText }}</span>

    <div class="window-controls">
      <button type="button" (click)="onMinimize($event)">—</button>
      <button type="button" (click)="onToggleMaximize($event)">
        {{ maximized ? '❐' : '□' }}
      </button>
      <button type="button" class="close-btn" (click)="onClose($event)">✕</button>
    </div>
  </div>

  <div class="window-body">
    <ng-content></ng-content>
  </div>

</div>
