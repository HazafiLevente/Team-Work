<!doctype html>
<html lang="hu">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Setup Configurator</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
<header class="top-menu">
    <div class="brand">
        <div class="logo">SC</div>
        <div>
            <h1>Setup Configurator</h1>
            <div class="muted" style="font-size:12px;margin-top:2px">Test Version</div>
        </div>
    </div>

    <nav class="nav" aria-label="Főmenü">
        <a href="/">Home</a>
        <a href="/">Projects</a>
        <a href="/">Market</a>
        <a href="/">Settings</a>
        <a class="cta" href="/regist">Connect</a>
    </nav>
</header>

<main class="content">
    <section class="panel">
        <div class="hero">
            <h2>Üdv a Setup Configuratorban</h2>
            <div class="neon-line"></div>
            <div style="display:flex; gap:10px; margin-top:10px;">
                <a class="btn" href="#">Felfedezés</a>
                <a class="btn" href="#">Dashboard</a>
                <span class="tag">vTest</span>
            </div>
        </div>
    </section>

    <!-- Új termékszekció (a projekt fontos része) -->
    <section id="productSection" class="panel product-list" style="margin-top: 25px;">
        <h2 style="margin-bottom:15px;">Legújabb termékek</h2>
        <div id="productContainer" class="product-grid"></div>
    </section>


    <aside class="sidebar">
        <div class="panel small-card">
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <div>
                    <div style="font-weight:800">New Products</div>
                    <div class="muted" style="margin-top:6px">últ. 24 óra</div>
                </div>
                <div style="text-align:right">
                    <div style="font-size:18px; font-weight:800"></div>
                    <div class="muted">alerts</div>
                </div>
            </div>
        </div>
    </aside>
</main>

<script src="script.js"></script>
</body>
</html>
