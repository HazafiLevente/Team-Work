<div class="admin-users">

  <h2>👥 Felhasználók</h2>

  <div class="users-table">

    <div class="users-row header">
      <span>Username</span>
      <span>Email</span>
      <span>Role</span>
      <span>City</span>
      <span>Age</span>
      <span>Action</span>
    </div>

    <div
      class="users-row"
      *ngFor="let u of usersList">

      <input [(ngModel)]="u.username" />
      <span class="muted">{{ u.email }}</span>

      <select [(ngModel)]="u.role">
        <option value="user">user</option>
        <option value="admin">admin</option>
        <option value="admin+">admin+</option>
        <option value="owner">owner</option>
      </select>

      <input [(ngModel)]="u.city" />
      <input type="number" [(ngModel)]="u.age" />

      <button class="admin-btn small" (click)="saveUser(u)">
        💾
      </button>

    </div>

  </div>

</div>
