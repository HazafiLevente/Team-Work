<form class="settings-page" [formGroup]="form">
  <section class="card hero-card">
    <div>
      <h2>Tema Beallitas</h2>
      <p class="muted">
        Itt tudod kiválasztani, melyik témát szeretnéd használni az oldalon.
      </p>
    </div>
  </section>

  <section class="card">
    <div class="section-head">
      <div>
        <h3>Tema</h3>
        <p class="muted">Valassz egy témát, és az egész felület azonnal átvált.</p>
      </div>
      <div class="theme-badge">
        Aktiv: {{ activeThemeTitle }}
      </div>
    </div>

    <div class="theme-grid">
      <button
        type="button"
        *ngFor="let t of themeOptions"
        class="theme-card"
        [class.active]="isThemeActive(t.key)"
        (click)="selectTheme(t.key)">

        <div class="theme-preview" [ngClass]="t.previewClass">
          <div class="mini-sidebar"></div>
          <div class="mini-content">
            <div class="mini-top"></div>
            <div class="mini-cards">
              <span></span><span></span><span></span>
            </div>
          </div>
        </div>

        <div class="theme-meta">
          <div class="theme-title-row">
            <div class="theme-title">{{ t.title }}</div>
            <div class="active-pill" *ngIf="isThemeActive(t.key)">Aktiv</div>
          </div>
          <div class="theme-sub">{{ t.sub }}</div>
        </div>
      </button>
    </div>
  </section>
</form>
