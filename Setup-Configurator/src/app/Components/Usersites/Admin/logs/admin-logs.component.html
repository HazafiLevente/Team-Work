<div class="logs-page">


    <div class="logs-toolbar">
        <h2>📋 Server Logs</h2>

        <div class="toolbar-controls">
            <select [(ngModel)]="levelFilter" (change)="applyFilters()">
                <option value="">Összes szint</option>
                <option value="log">🔵 Log</option>
                <option value="warn">🟡 Warn</option>
                <option value="error">🔴 Error</option>
            </select>

            <input type="text" [(ngModel)]="searchFilter" (keyup.enter)="applyFilters()" placeholder="🔍 Keresés..." />

            <button class="tool-btn" (click)="applyFilters()">Szűrés</button>
            <button class="tool-btn" (click)="resetFilters()">Reset</button>

            <button class="tool-btn" [class.active]="autoRefresh" (click)="toggleAutoRefresh()">
                @if (autoRefresh) { 🔄 Auto } @else { ⏸ Pause }
            </button>

            <button class="tool-btn danger" (click)="clearLogs()">🗑 Törlés</button>
        </div>
    </div>


    @if (loading) {
    <div class="muted">Betöltés...</div>
    } @else if (logs.length === 0) {
    <div class="muted">Nincs log bejegyzés.</div>
    } @else {
    <div class="log-table">
        @for (entry of logs; track entry.id) {
        <div class="log-row" [class.warn]="entry.level === 'warn'" [class.error]="entry.level === 'error'">
            <span class="log-icon">{{ levelIcon(entry.level) }}</span>
            <span class="log-time">{{ formatTime(entry.timestamp) }}</span>
            <span class="log-msg">{{ entry.message }}</span>
        </div>
        }
    </div>
    }

    <div class="log-count muted">{{ logs.length }} bejegyzés</div>
</div>
