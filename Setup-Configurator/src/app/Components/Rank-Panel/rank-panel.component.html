<div class="rank-backdrop" (click)="backdropClick($event)">
  <app-electric-border class="rank-shell" [color]="color" [borderRadius]="18">
    <div class="rank-card" [style.color]="color">
      <div class="top">
        <div>
          <div class="pill">Rangok</div>
          <div class="title">Szinted: {{ level }}/10</div>
          <div class="muted" *ngIf="data">
            {{ data.points }} pont • Következőhöz még {{ data.next.pointsNeeded }} pont
          </div>
        </div>

        <button class="x" (click)="close.emit()">✕</button>
      </div>

      <div *ngIf="data" class="bar-wrap">
        <div class="bar-meta">
          <span>{{ data.current.min }}</span>
          <span>{{ data.current.max }}</span>
        </div>

        <div class="bar">
          <div class="fill" [style.width.%]="(data.progress ?? 0) * 100"></div>

        </div>
      </div>


    </div>
  </app-electric-border>
</div>
