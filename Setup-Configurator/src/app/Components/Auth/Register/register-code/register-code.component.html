<form (ngSubmit)="verify.emit()" class="auth-form code-form">
  <h2 class="title">Email megerősítés</h2>
  <p class="subtitle">
    Küldtünk egy 6 jegyű kódot erre:
    <span class="highlight">{{ email }}</span>
  </p>

  <div *ngIf="errorMessage" class="alert error">{{ errorMessage }}</div>
  <div *ngIf="successMessage" class="alert success">{{ successMessage }}</div>

  <div class="code-wrap">
    <input
      class="code-input"
      [ngModel]="code"
      (ngModelChange)="codeChange.emit($event)"
      name="code"
      inputmode="numeric"
      autocomplete="one-time-code"
      placeholder="______"
      maxlength="6"
      required
    />
    <div class="hint">Csak számok (6 számjegy)</div>
  </div>

  <button class="btn" type="submit" [disabled]="loading || !code || code.length < 6">
    {{ loading ? 'Ellenőrzés...' : 'Megerősítés' }}
  </button>

  <div class="actions">
    <button class="link-btn" type="button" (click)="resend.emit()" [disabled]="loading">
      Kód újraküldése
    </button>

    <button class="link-btn muted" type="button" (click)="back.emit()" [disabled]="loading">
      ← Vissza
    </button>
  </div>
</form>
