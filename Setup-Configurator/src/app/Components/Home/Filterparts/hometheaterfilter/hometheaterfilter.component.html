<div class="carfilter" *ngIf="form" [formGroup]="form">

  <div class="carfilter-header">
    <span class="tag" title="Home Theatre kategória szűrők">🎬 HT</span>
    <span class="muted2">Meta-alapú (dinamikus) HT szűrő</span>
  </div>

  <div class="muted" *ngIf="loading">Betöltés…</div>
  <div class="muted" *ngIf="error">{{ error }}</div>

  <div class="filter-grid" *ngIf="!loading">

    <select class="search-input" title="HT tábla" formControlName="tableName">
      <option value="">HT típus (összes)</option>
      <option *ngFor="let t of meta?.table_names" [value]="t">{{ t }}</option>
    </select>

    <select class="search-input" title="Gyártó" formControlName="manufacturer">
      <option value="">Gyártó (összes)</option>
      <option *ngFor="let m of meta?.manufacturers" [value]="m">{{ m }}</option>
    </select>

    <input class="search-input"
           title="Modell részlet"
           placeholder="Modell (pl. Q990D)"
           formControlName="model" />

    <input class="search-input"
           type="number" min="0"
           title="Min ár"
           placeholder="Ár min"
           formControlName="priceMin" />

    <input class="search-input"
           type="number" min="0"
           title="Max ár"
           placeholder="Ár max"
           formControlName="priceMax" />
  </div>

  <!-- DYNAMIC: csak ha van kiválasztott table meta -->
  <div class="filter-grid"
       *ngIf="!loading && dynForSelected() as dyn"
       [formGroup]="dynamicForm">

    <!-- BOOLEANS -->
    <ng-container *ngFor="let k of (dyn.booleans || [])">
      <label class="muted">
        <input type="checkbox" [formControlName]="k">
        {{ k }}
      </label>
    </ng-container>

    <!-- NUMBERS (RANGE) -->
    <ng-container *ngFor="let k of (dyn.numbers || [])">
      <div [formGroupName]="k">
        <input class="search-input" type="number" [placeholder]="k + ' min'" formControlName="min">
        <input class="search-input" type="number" [placeholder]="k + ' max'" formControlName="max">
      </div>
    </ng-container>

    <!-- ENUMS (SELECT) -->
    <ng-container *ngFor="let k of enumKeys()">
      <select class="search-input" [formControlName]="k" [title]="k">
        <option value="">{{ k }} (összes)</option>

        <option *ngFor="let opt of (dyn.enums?.[k] || [])" [value]="opt">
          {{ opt }}
        </option>
      </select>
    </ng-container>

  </div>


  <div class="carfilter-footer">
    <button type="button"
            class="btn small"
            title="Törli a HT szűrőket"
            (click)="clear()">
      🧹 HT szűrők törlése
    </button>

    <span class="muted">A 🔎 Keresés gomb ezeket is figyelembe veszi.</span>
  </div>

</div>
