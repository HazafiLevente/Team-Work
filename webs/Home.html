<!doctype html>
<html lang="hu">
<head>

    <title>Setup Configurator</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
<header class="top-menu">
    <div class="brand">
        <div class="logo">SC</div>
        <div>
            <h1>Setup Configurator</h1>
            <div class="muted" style="font-size:12px;margin-top:2px">Test Version</div>
        </div>
    </div>

    <nav class="nav" aria-label="Főmenü">
        <a href="/home">Home</a>

<main class="content"></main>

            style="list-style:none; padding:0; margin:0; font-size:13px;"></ul>

    <div class="panel small-card" style="margin-top:15px;">
        <h3 style="margin-bottom:10px;">My Setup</h3>

        <button id="mysetup-btn"
                class="btn"
                style="width:100%; text-align:center; margin-bottom:12px;">
            My Setup
        </button>

        <div id="mysetup-box"
             class="muted"
             style="font-size:14px; padding-top:6px;">
            Nincs elem kiválasztva.
        </div>
    </div>

<script src="script.js"></script>
