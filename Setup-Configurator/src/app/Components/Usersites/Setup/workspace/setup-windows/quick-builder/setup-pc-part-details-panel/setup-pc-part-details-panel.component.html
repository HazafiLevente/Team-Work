<div
  #panelEl
  class="panel"
  [style.left.px]="panelX"
  [style.top.px]="panelY"
  (click)="stop($event)"
  (mousemove)="onDrag($event)"
  (mouseup)="stopDrag()"
  (mouseleave)="stopDrag()"
>
  <div class="titlebar" (mousedown)="startDrag($event)">
    <div class="caption">
      <div class="big">{{ title() }}</div>
      <div class="small">{{ subtitle() }}</div>
    </div>

    <button class="x" type="button" (click)="close.emit()">×</button>
  </div>

  <div class="content">
    @if (loading) {
      <div class="state">Betöltés...</div>
    } @else if (error) {
      <div class="state error">{{ error }}</div>
    } @else {
      <div class="list">
        @for (row of visibleRows(); track row.label + ':' + row.value) {
          <div class="row">
            <div class="label">{{ row.label }}</div>
            <div class="value">{{ row.value }}</div>
          </div>
        }
      </div>

      <div class="hint">
        Húzható panel • Dupla katt az alkatrész elemre a megnyitáshoz
      </div>
    }
  </div>
</div>
