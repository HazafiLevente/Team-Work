<!doctype html>
<html lang="hu">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Setup Configurator</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
<header class="top-menu">
    <div class="brand">
        <div class="logo">SC</div>
        <div>
            <h1>Setup Configurator</h1>
            <div class="muted" style="font-size:12px;margin-top:2px">Test Version</div>
        </div>
    </div>
    <nav class="nav" aria-label="Főmenü">
        <a href="#home">Home</a>
        <a href="#projects">Projects</a>
        <a href="#market">Market</a>
        <a href="#settings">Settings</a>
        <a class="cta" href="#connect">Connect</a>
    </nav>
</header>
<main class="content">
    <section class="panel">
        <div class="hero">
            <h2>Üdv a Setup Configuratorban</h2>
            <div class="neon-line"></div>
            <p></p>
            <div style="display:flex; gap:10px; margin-top:10px;">
                <a class="btn" href="#">Felfedezés</a>
                <a class="btn" href="#">Dashboard</a>
                <span class="tag">vTest</span>
            </div>
        </div>

        <div style="margin-top:18px; display:grid; grid-template-columns: repeat(auto-fit,minmax(160px,1fr)); gap:12px;">
            <div class="small-card">
                <div class="mono">Setup</div>
                <div class="muted" style="margin-top:6px">node-Gamer_Setup</div>
            </div>
            <div class="small-card">
                <div class="mono">ai-core</div>
                <div class="muted" style="margin-top:6px">model: Gemini v3</div>
            </div>
            <div class="small-card">
                <div class="mono">credits</div>
                <div style="margin-top:6px; font-weight:800; font-size:18px">0 Credit</div>
            </div>
        </div>
    </section>
    <aside class="sidebar">
        <div class="panel small-card">
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <div>
                    <div style="font-weight:800">New Porducts</div>
                    <div class="muted" style="margin-top:6px">últ. 24 óra</div>
                </div>
                <div style="text-align:right">
                    <div style="font-size:18px; font-weight:800"></div>
                    <div class="muted">alerts</div>
                </div>
            </div>
        </div>
    </aside>
</main>
</body>
</html>
