<div id="_1" style="display:flex; gap:12px; flex-wrap:wrap; align-items:center;">

  <!-- GYÁRTÓ -->
  <select [(ngModel)]="manufacturer"
          style="min-width:240px; padding:14px; border-radius:10px; background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.12); color:white; font-size:16px;">
    <option value="">Összes gyártó</option>
    <option *ngFor="let m of manufacturers" [value]="m">{{ m }}</option>
  </select>

  <!-- SZÖVEGES KERESÉS -->
  <input type="text"
         placeholder="Keresés: model..."
         [(ngModel)]="term"
         (keydown.enter)="searchButton()"
         style="flex:1; min-width:220px; padding:14px; border-radius:10px; background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.12); color:white; font-size:16px;" />

  <!-- MIN ÁR -->
  <input type="number"
         [ngModel]="priceMin"
         (ngModelChange)="priceMin = $event"
         placeholder="Min ár (Ft)"
         min="0"
         step="1"
         (input)="sanitizePrice('min')"
         style="width:160px; padding:14px; border-radius:10px; background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.12); color:white; font-size:16px;" />

  <!-- MAX ÁR -->
  <input type="number"
         [ngModel]="priceMax"
         (ngModelChange)="priceMax = $event"
         placeholder="Max ár (Ft)"
         min="0"
         step="1"
         (input)="sanitizePrice('max')"
         style="width:160px; padding:14px; border-radius:10px; background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.12); color:white; font-size:16px;" />

  <!-- RENDEZÉS -->
  <select [(ngModel)]="sort"
          style="width:220px; padding:14px; border-radius:10px; background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.12); color:white; font-size:16px;">
    <option value="">Alap (nincs rendezés)</option>
    <option value="price_asc">Ár ↑ növekvő</option>
    <option value="price_desc">Ár ↓ csökkenő</option>
    <option value="name_asc">Név A→Z</option>
    <option value="name_desc">Név Z→A</option>
  </select>

  <!-- ✅ BIZTOS MŰKÖDŐ GOMB -->
  <button type="button" class="btn" (click)="searchButton()">
    🔎 Keresés
  </button>

</div>
