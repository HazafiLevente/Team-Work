<div class="message-page" *ngIf="message">

  <h2 class="title">{{ message.title }}</h2>

  <div class="content">
    {{ message.message }}
  </div>

  <div class="meta">
    <span class="sender">
      👤 {{ message.sender_name }}
    </span>

    <span class="time">
      ⏱ {{ timeAgo(message.created_at) }}
    </span>
  </div>

</div>
