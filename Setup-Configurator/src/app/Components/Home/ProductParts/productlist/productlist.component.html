<div class="product-grid" *ngIf="filteredProducts.length > 0">
  <app-product
    *ngFor="let p of filteredProducts"
    [product]="p"
    (openProduct)="onOpenProduct($event)">
  </app-product>
</div>

<p class="muted" *ngIf="filteredProducts.length === 0">
  Nincs találat.
</p>

<!-- ✅ Details panel -->
<app-product-details-panel
  *ngIf="selectedProduct"
  [product]="selectedProduct"
  (closed)="onClosePanel()">
</app-product-details-panel>
