<div class="overlay" (click)="close.emit()"></div>

<div class="panel" (click)="$event.stopPropagation()">
  <div class="panel-header">
    <div class="panel-title-wrap">
      <span class="panel-kicker">Asszisztens</span>
      <span class="panel-title">Setup AI</span>
    </div>
    <span class="close-btn" (click)="close.emit()">X</span>
  </div>

  <div class="panel-body">
    <div
      *ngFor="let m of messages"
      class="message"
      [class.me]="m.sender === 'me'"
      [class.ai]="m.sender === 'ai'"
      [class.system]="m.sender === 'system'"
      [class.product-wrapper]="m.sender === 'product'"
      [class.hidden-message]="m.sender === 'product'">

      <ng-container *ngIf="m.text">
        <ng-container *ngIf="m.sender === 'ai' && !m.loading; else plainPanelText">
          <div class="ai-badge-row">
            <span class="ai-badge">AI Valasz</span>
            <span class="ai-message-time">{{ m.created_at | date:'HH:mm' }}</span>
          </div>

          <div class="ai-tools-shell" *ngIf="buildToolCards(m) as toolCards">
            <div class="ai-tools-header" *ngIf="toolCards.length">
              <span class="ai-tools-kicker">Ajanlott eszkozok</span>
              <span class="ai-tools-caption">A valaszhoz tartozo termekek</span>
            </div>

            <div class="ai-tools-grid" *ngIf="toolCards.length">
              <a
                *ngFor="let card of toolCards; trackBy: trackByToolCard"
                class="ai-tool-card"
                [href]="card.href">
                <div class="ai-tool-icon">{{ card.icon }}</div>
                <div class="ai-tool-copy">
                  <span class="ai-tool-eyebrow">{{ card.eyebrow }}</span>
                  <span class="ai-tool-title">{{ card.title }}</span>
                  <span class="ai-tool-subtitle">{{ card.subtitle }}</span>
                </div>
              </a>
            </div>
          </div>

          <div class="ai-rich-text" [class.ai-rich-text-muted]="hasToolCards(m)">
            <div
              *ngFor="let block of formatAiText(m.text, m.products || [])"
              class="ai-line"
              [class.ai-line-heading]="block.type === 'heading'"
              [class.ai-line-bullet]="block.type === 'bullet'"
              [class.ai-line-paragraph]="block.type === 'paragraph'">
              <ng-container *ngIf="block.mention && !block.product; else plainPanelAiLine">
                <a
                  class="ai-mention-card inline"
                  [attr.href]="buildMentionOpenPath(block.mention)">
                  <span class="ai-mention-label">Eszkoz</span>
                  <span class="ai-mention-name">{{ block.mention }}</span>
                </a>
              </ng-container>

              <ng-template #plainPanelAiLine>
                <span *ngIf="block.type === 'bullet'" class="ai-line-dot"></span>
                <span>{{ block.text }}</span>
              </ng-template>
            </div>
          </div>
        </ng-container>

        <ng-template #plainPanelText>
          {{ m.text }}
        </ng-template>
      </ng-container>
    </div>
  </div>

  <div class="panel-input">
    <input
      [(ngModel)]="newMessage"
      (keyup.enter)="send()"
      placeholder="Irj kerdest a termekekrol..."
    />
    <button (click)="send()">Kuldes</button>
  </div>
</div>
